name: top_speed
description: "Top Speed — sport activity speed tracker."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  geolocator: ^13.0.0
  sensors_plus: ^6.0.0
  shared_preferences: ^2.3.0
  flutter_bloc: ^9.1.1
  go_router: ^14.8.1
  intl: ^0.20.2
  fl_chart: ^0.69.0
  wakelock_plus: ^1.2.0
  share_plus: ^10.0.0
  screenshot: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#080808"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: false

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon/
